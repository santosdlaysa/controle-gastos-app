<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bubble-ai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="40" fill="#0f172a"/>
  <text x="40" y="26" font-family="Arial" font-size="13" fill="#94a3b8">09:41</text>

  <!-- Header -->
  <rect y="40" width="1280" height="70" fill="#1e293b"/>
  <circle cx="64" cy="75" r="22" fill="url(#accent)"/>
  <text x="64" y="82" font-family="Arial" font-size="18" fill="#ffffff" text-anchor="middle">✦</text>
  <text x="100" y="68" font-family="Arial" font-size="13" fill="#94a3b8">Assistente Financeiro</text>
  <text x="100" y="90" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Orgenyx IA</text>
  <circle cx="1220" cy="75" r="8" fill="#10b981"/>
  <text x="1200" y="80" font-family="Arial" font-size="12" fill="#10b981" text-anchor="end">online</text>

  <!-- Chat area -->
  <!-- AI message 1 -->
  <circle cx="64" cy="150" r="18" fill="url(#accent)"/>
  <text x="64" y="157" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">✦</text>
  <rect x="92" y="126" width="700" height="60" rx="16" fill="url(#bubble-ai)"/>
  <rect x="92" y="126" width="700" height="60" rx="16" fill="none" stroke="#4338ca" stroke-width="1"/>
  <text x="116" y="150" font-family="Arial" font-size="14" fill="#c7d2fe">Olá! Analisei seus gastos de março. Você gastou</text>
  <text x="116" y="172" font-family="Arial" font-size="14" fill="#c7d2fe">R$320 em alimentação esta semana — 18% acima da média.</text>

  <!-- User message 1 -->
  <rect x="780" y="200" width="460" height="44" rx="16" fill="#4338ca"/>
  <text x="800" y="227" font-family="Arial" font-size="14" fill="#ffffff">Onde posso economizar este mês?</text>

  <!-- AI message 2 -->
  <circle cx="64" cy="278" r="18" fill="url(#accent)"/>
  <text x="64" y="285" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">✦</text>
  <rect x="92" y="258" width="820" height="100" rx="16" fill="url(#bubble-ai)"/>
  <rect x="92" y="258" width="820" height="100" rx="16" fill="none" stroke="#4338ca" stroke-width="1"/>
  <text x="116" y="282" font-family="Arial" font-size="14" fill="#c7d2fe">Com base nos seus padrões, identifiquei 3 oportunidades:</text>
  <text x="116" y="306" font-family="Arial" font-size="14" fill="#a5b4fc">① Lazer — R$130 acima do orçamento em streaming e assinaturas</text>
  <text x="116" y="326" font-family="Arial" font-size="14" fill="#a5b4fc">② Alimentação — 6 pedidos de delivery esta semana (R$180)</text>
  <text x="116" y="346" font-family="Arial" font-size="14" fill="#a5b4fc">③ Combustível — rota alternativa pode reduzir 12% do gasto</text>

  <!-- User message 2 -->
  <rect x="900" y="376" width="340" height="44" rx="16" fill="#4338ca"/>
  <text x="920" y="403" font-family="Arial" font-size="14" fill="#ffffff">Me mostra o resumo do mês</text>

  <!-- AI message 3 — card with data -->
  <circle cx="64" cy="448" r="18" fill="url(#accent)"/>
  <text x="64" y="455" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">✦</text>
  <rect x="92" y="428" width="860" height="140" rx="16" fill="url(#bubble-ai)"/>
  <rect x="92" y="428" width="860" height="140" rx="16" fill="none" stroke="#4338ca" stroke-width="1"/>
  <text x="116" y="452" font-family="Arial" font-size="14" fill="#c7d2fe">Resumo de março 2026:</text>

  <rect x="116" y="464" width="180" height="70" rx="12" fill="#1e1b4b"/>
  <text x="126" y="484" font-family="Arial" font-size="11" fill="#94a3b8">Receita</text>
  <text x="126" y="510" font-family="Arial" font-size="18" font-weight="bold" fill="#10b981">R$6.500</text>

  <rect x="310" y="464" width="180" height="70" rx="12" fill="#1e1b4b"/>
  <text x="320" y="484" font-family="Arial" font-size="11" fill="#94a3b8">Despesas</text>
  <text x="320" y="510" font-family="Arial" font-size="18" font-weight="bold" fill="#f43f5e">R$3.260</text>

  <rect x="504" y="464" width="180" height="70" rx="12" fill="#1e1b4b"/>
  <text x="514" y="484" font-family="Arial" font-size="11" fill="#94a3b8">Saldo</text>
  <text x="514" y="510" font-family="Arial" font-size="18" font-weight="bold" fill="#6366f1">R$3.240</text>

  <rect x="698" y="464" width="220" height="70" rx="12" fill="#1e1b4b"/>
  <text x="708" y="484" font-family="Arial" font-size="11" fill="#94a3b8">Economia vs meta</text>
  <text x="708" y="510" font-family="Arial" font-size="18" font-weight="bold" fill="#fbbf24">↑ 8%</text>

  <!-- Suggestions chips -->
  <text x="92" y="598" font-family="Arial" font-size="12" fill="#64748b">Sugestões:</text>
  <rect x="92" y="608" width="210" height="34" rx="17" fill="#1e293b"/>
  <rect x="92" y="608" width="210" height="34" rx="17" fill="none" stroke="#4338ca" stroke-width="1"/>
  <text x="197" y="630" font-family="Arial" font-size="13" fill="#a5b4fc" text-anchor="middle">Como economizar mais?</text>

  <rect x="316" y="608" width="200" height="34" rx="17" fill="#1e293b"/>
  <rect x="316" y="608" width="200" height="34" rx="17" fill="none" stroke="#4338ca" stroke-width="1"/>
  <text x="416" y="630" font-family="Arial" font-size="13" fill="#a5b4fc" text-anchor="middle">Maior gasto do mês</text>

  <rect x="530" y="608" width="180" height="34" rx="17" fill="#1e293b"/>
  <rect x="530" y="608" width="180" height="34" rx="17" fill="none" stroke="#4338ca" stroke-width="1"/>
  <text x="620" y="630" font-family="Arial" font-size="13" fill="#a5b4fc" text-anchor="middle">Metas de março</text>

  <!-- Input bar -->
  <rect x="40" y="656" width="1160" height="48" rx="24" fill="#1e293b"/>
  <rect x="40" y="656" width="1160" height="48" rx="24" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="72" y="685" font-family="Arial" font-size="14" fill="#475569">Pergunte algo sobre suas finanças...</text>
  <circle cx="1228" cy="680" r="20" fill="url(#accent)"/>
  <text x="1228" y="687" font-family="Arial" font-size="18" fill="#ffffff" text-anchor="middle">↑</text>
</svg>
