services:
  - type: web
    name: controle-gastos-api
    runtime: node
    buildCommand: NODE_ENV=development npx pnpm@9.12.0 install --frozen-lockfile && npx pnpm@9.12.0 run build
    startCommand: node dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: PLUGGY_CLIENT_ID
        sync: false
      - key: PLUGGY_CLIENT_SECRET
        sync: false
